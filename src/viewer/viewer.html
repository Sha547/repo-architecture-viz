<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repo Architecture Visualizer</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <header id="topbar">
      <div class="brand">
        <span class="logo">⚡</span>
        <span class="title" id="repoTitle">Loading…</span>
      </div>
      <div class="actions">
        <input id="searchInput" type="search" placeholder="Search files…" />
        <button id="explainBtn" type="button" class="primary">✨ Explain</button>
        <button id="exportPngBtn" type="button" title="Download as PNG">PNG</button>
        <button id="exportMermaidBtn" type="button" title="Copy Mermaid diagram">Mermaid</button>
        <button id="patBtn" type="button" title="GitHub Personal Access Token">PAT</button>
        <button id="aiKeyBtn" type="button" title="Anthropic API key">AI key</button>
      </div>
    </header>
    <main>
      <aside id="sidebar">
        <section id="status">
          <div class="status-row">
            <span>Status</span>
            <span id="statusText">Idle</span>
          </div>
          <div class="status-row">
            <span>Files</span>
            <span id="fileCount">—</span>
          </div>
          <div class="status-row">
            <span>Edges</span>
            <span id="edgeCount">—</span>
          </div>
        </section>
        <section id="folders">
          <h3>Folders</h3>
          <ul id="folderList"></ul>
        </section>
        <section id="hotFilesSection">
          <h3>Hot files</h3>
          <ul id="hotFilesList"></ul>
        </section>
      </aside>
      <div id="graph"></div>
    </main>

    <div id="modalBackdrop" hidden>
      <div id="modal">
        <div class="modal-head">
          <h2>Architecture summary</h2>
          <button id="modalClose" type="button" aria-label="Close">×</button>
        </div>
        <div id="modalBody">
          <p class="muted">Generating…</p>
        </div>
      </div>
    </div>
    <script type="module" src="./viewer.ts"></script>
  </body>
</html>
